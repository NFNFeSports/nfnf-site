<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NFNF</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #0f0f0f);
    color: white;
    text-align: center;
  }

  .container {
    padding: 60px 20px;
  }

  .logo {
    width: 160px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
  }

  h1 {
    font-size: 42px;
    margin: 20px 0 10px;
    letter-spacing: 2px;
  }

  p {
    opacity: 0.75;
    margin-bottom: 30px;
  }

  .buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin-top: 20px;
  }

  a.button {
    padding: 12px 18px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: transform 0.2s ease;
  }

  a.button:hover {
    transform: scale(1.05);
  }

  .spotify { background: #1DB954; }
  .tiktok { background: #000000; border: 1px solid #333; }
  .youtube { background: #FF0000; }
  .instagram { background: #E1306C; }
  .discord { background: #5865F2; }
  .cloud { background: #00AEEF; }

  footer {
    margin-top: 50px;
    font-size: 12px;
    opacity: 0.4;
  }
</style>

</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img class="logo" src="logo.png" alt="NFNF Logo">

  <!-- TITLE -->
  <h1>NFNF</h1>
  <p>Música • Esports • Comunidade</p>

  <!-- BUTTONS -->
  <div class="buttons">

    <a class="button spotify"
       href="https://open.spotify.com/intl-pt/artist/0Ellt3nCTFrFYBUPgf8rWS"
       target="_blank">🎵 Spotify</a>

    <a class="button tiktok"
       href="https://www.tiktok.com/@nfnfes"
       target="_blank">🎬 TikTok</a>

    <a class="button youtube"
       href="https://www.youtube.com/@NaFeNaoFalha"
       target="_blank">▶ YouTube</a>

    <a class="button instagram"
       href="https://www.instagram.com/nafenaofalha"
       target="_blank">📸 Instagram</a>

    <a class="button discord"
       href="https://discord.gg/HTgaJn8BGp"
       target="_blank">💬 Discord</a>

    <a class="button cloud"
       href="https://cloud.nfnf.pt"
       target="_blank">☁ Cloud</a>

  </div>

  <!-- FOOTER -->
  <footer>
    © NFNF Esports • Powered by Cloudflare + Nextcloud
  </footer>

</div>

</body>
</html>
