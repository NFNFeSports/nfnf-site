<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFNF | NaFéNãoFalha</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Orbitron', sans-serif;
  background: #000;
  color: #fff;
  overflow-x: hidden;
}

/* LOADER */
#loader {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#loader h1 {
  color: #00fff7;
  text-shadow: 0 0 20px #00fff7;
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0% {opacity: 1;}
  50% {opacity: 0.3;}
  100% {opacity: 1;}
}

/* PARTICLES LAYER */
canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* MAIN LAYER */
.wrapper {
  position: relative;
  z-index: 2;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  z-index: 10;
}

nav {
  display: flex;
  gap: 18px;
}

nav a {
  color: #fff;
  text-decoration: none;
  opacity: 0.7;
  font-size: 14px;
}

nav a:hover {
  opacity: 1;
  color: #00fff7;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

.hero h1 {
  font-size: clamp(40px, 6vw, 70px);
  color: #00fff7;
  text-shadow: 0 0 25px #00fff7;
}

.hero p {
  margin-top: 10px;
  opacity: 0.7;
}

/* BUTTONS */
.btn-group {
  margin-top: 25px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn {
  padding: 12px 22px;
  border: 1px solid #00fff7;
  color: #00fff7;
  text-decoration: none;
  transition: 0.25s;
  font-size: 14px;
}

.btn:hover {
  background: #00fff7;
  color: black;
  box-shadow: 0 0 20px #00fff7;
}

/* SECTIONS */
section {
  padding: 80px 20px;
  text-align: center;
}

section h2 {
  font-size: 28px;
  margin-bottom: 20px;
  color: #00fff7;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
  max-width: 900px;
  margin: auto;
}

.card {
  border: 1px solid #00fff7;
  padding: 20px;
  transition: 0.3s;
  background: rgba(255,255,255,0.02);
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 0 20px #00fff740;
}

/* FOOTER */
footer {
  padding: 20px;
  text-align: center;
  opacity: 0.4;
  font-size: 12px;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <h1>NFNF BOOTING...</h1>
</div>

<!-- PARTICLES -->
<canvas id="c"></canvas>

<div class="wrapper">

<!-- HEADER -->
<header>
  <div>NFNF</div>
  <nav>
    <a href="#">Home</a>
    <a href="#team">Equipa</a>
    <a href="#server">Server</a>
  </nav>
</header>

<!-- HERO -->
<div class="hero">
  <h1>NaFéNãoFalha</h1>
  <p>Gaming • Music • Esports Community</p>

  <div class="btn-group">
    <a class="btn" href="https://discord.gg/tjKfnmxVuM">Discord</a>
    <a class="btn" href="https://cloud.nfnf.pt">Cloud</a>
  </div>
</div>

<!-- TEAM -->
<section id="team">
  <h2>EQUIPA</h2>

  <div class="grid">
    <div class="card">Player 1</div>
    <div class="card">Player 2</div>
    <div class="card">Player 3</div>
  </div>
</section>

<!-- SERVER -->
<section id="server">
  <h2>DAYZ SERVER</h2>

  <p>Junta-te ao Discord para acesso ao servidor.</p>

  <div class="btn-group">
    <a class="btn" href="https://discord.gg/tjKfnmxVuM">Entrar no Acesso</a>
  </div>
</section>

<!-- FOOTER -->
<footer>
  © 2026 NFNF — NaFéNãoFalha
</footer>

</div>

<script>

/* LOADER */
window.onload = () => {
  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
  }, 1200);
};

/* PARTICLES SAFE (não bloqueia UI) */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

let particles = [];

for(let i=0;i<70;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    dx:(Math.random()-0.5)*0.6,
    dy:(Math.random()-0.5)*0.6
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00fff7";

  particles.forEach(p=>{
    ctx.fillRect(p.x,p.y,2,2);

    p.x += p.dx;
    p.y += p.dy;

    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
  });

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
